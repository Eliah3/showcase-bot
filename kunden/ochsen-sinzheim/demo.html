<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ochsen Sinzheim – KI Demo</title>
<style>
  :root {
    --primary:       #91252c;
    --primary-light: #ac5b60;
    --header-dark:   #411013;
    --header-mid:    #57161a;
    --text-dark:     #2b0b0d;
    --shadow-color:  rgba(145,37,44,0.55);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; }
  #site-frame { width: 100vw; height: 100vh; border: none; display: block; }
  #zg-btn {
    position: fixed; bottom: 28px; right: 28px;
    width: 62px; height: 62px;
    background: linear-gradient(135deg, #91252c, #ac5b60);
    border-radius: 50%; border: none; cursor: pointer;
    box-shadow: 0 4px 24px rgba(145,37,44,0.55);
    z-index: 2147483647;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s; animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) 1s both;
  }
  @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
  #zg-btn:hover { transform: scale(1.1); }
  .notif { position: absolute; top: 3px; right: 3px; width: 13px; height: 13px; background: #ff6b6b; border-radius: 50%; border: 2px solid white; }
  #zg-win {
    position: fixed; bottom: 106px; right: 28px; width: 360px; height: 520px;
    background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    z-index: 2147483646; display: flex; flex-direction: column; overflow: hidden;
    transform: scale(0.85) translateY(20px); transform-origin: bottom right;
    opacity: 0; pointer-events: none;
    transition: transform 0.3s cubic-bezier(.34,1.3,.64,1), opacity 0.25s;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  #zg-win.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }
  .zh { background: linear-gradient(135deg, #411013, #57161a); padding: 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .zh-av { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, #91252c, #ac5b60); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.78rem; color: white; flex-shrink: 0; }
  .zh-name { color: white; font-weight: 600; font-size: 0.9rem; }
  .zh-status { display: flex; align-items: center; gap: 5px; margin-top: 3px; }
  .zh-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .zh-status span { font-size: 0.7rem; color: #a0b0d0; }
  #zg-msgs { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; background: #f8f9fc; scroll-behavior: smooth; }
  #zg-msgs::-webkit-scrollbar { width: 3px; }
  #zg-msgs::-webkit-scrollbar-thumb { background: #d0d0e0; border-radius: 2px; }
  .zm { display: flex; gap: 8px; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .zm.user { flex-direction: row-reverse; }
  .zm-av { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(135deg, #91252c, #ac5b60); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 700; color: white; flex-shrink: 0; align-self: flex-end; }
  .zm.user .zm-av { background: #e0e0f0; color: #888; }
  .zm-bubble { max-width: 80%; padding: 10px 13px; border-radius: 16px; font-size: 0.83rem; line-height: 1.55; }
  .zm.bot .zm-bubble { background: white; color: #2b0b0d; border: 1px solid #e8e8f0; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .zm.user .zm-bubble { background: linear-gradient(135deg, #91252c, #ac5b60); color: white; border-bottom-right-radius: 4px; }
  .typing-dots { display: flex; gap: 4px; align-items: center; }
  .typing-dots span { width: 6px; height: 6px; background: #c0c0d0; border-radius: 50%; animation: dot 1.2s infinite; }
  .typing-dots span:nth-child(2){animation-delay:.15s} .typing-dots span:nth-child(3){animation-delay:.3s}
  @keyframes dot { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
  .zi { display: flex; align-items: center; gap: 8px; padding: 11px 13px; background: white; border-top: 1px solid #eee; flex-shrink: 0; }
  .zi input { flex: 1; border: 1px solid #e0e0ea; border-radius: 22px; padding: 9px 15px; font-size: 0.83rem; outline: none; color: #2b0b0d; background: #f8f9fc; font-family: inherit; transition: border-color 0.2s; }
  .zi input:focus { border-color: #91252c; background: white; }
  .zi input::placeholder { color: #b0b0c8; }
  .zi button { width: 36px; height: 36px; border-radius: 50%; border: none; background: linear-gradient(135deg, #91252c, #ac5b60); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.15s; }
  .zi button:hover { transform: scale(1.1); }
  .zi button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .zb { text-align: center; padding: 5px; font-size: 0.6rem; color: #c0c0d0; background: white; flex-shrink: 0; }
</style>
</head>
<body>

<iframe id="site-frame" src="https://www.ochsen-sinzheim.de/" title="Ochsen Sinzheim"></iframe>

<button id="zg-btn" onclick="zgToggle()">
  <div class="notif"></div>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
</button>

<div id="zg-win">
  <div class="zh">
    <div class="zh-av">OS</div>
    <div>
      <div class="zh-name">Ochsen Sinzheim Assistent</div>
      <div class="zh-status"><div class="zh-dot"></div><span>Online · KI-Assistent</span></div>
    </div>
  </div>
  <div id="zg-msgs">
    <div class="zm bot">
      <div class="zm-av">OS</div>
      <div class="zm-bubble">Hallo! 👋 Ich bin der KI-Assistent von <b>Ochsen Sinzheim</b>.<br><br>Wie kann ich Ihnen bei JTL-Schnittstellen, Connectoren oder Fulfillment-Anbindungen helfen?</div>
    </div>
  </div>
  <div class="zi">
    <input id="zg-inp" type="text" placeholder="Frage stellen …">
    <button id="zg-send">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="zb">Powered by KI</div>
</div>

<script>
  var isOpen = false;
  var isLoading = false;
  var chatHistory = [];

  function zgToggle() {
    isOpen = !isOpen;
    document.getElementById('zg-win').classList.toggle('open', isOpen);
    if (isOpen) {
      document.querySelector('.notif').style.display = 'none';
      setTimeout(function() { document.getElementById('zg-inp').focus(); }, 300);
    }
  }

  function addMsg(role, text) {
    var c = document.getElementById('zg-msgs');
    var d = document.createElement('div');
    d.className = 'zm ' + role;
    d.innerHTML = '<div class="zm-av">' + (role === 'bot' ? 'OS' : 'Sie') + '</div>' +
      '<div class="zm-bubble">' + text.replace(/\n/g, '<br>') + '</div>';
    c.appendChild(d);
    c.scrollTop = c.scrollHeight;
  }

  function addTyping() {
    var c = document.getElementById('zg-msgs');
    var d = document.createElement('div');
    d.className = 'zm bot'; d.id = 'typing';
    d.innerHTML = '<div class="zm-av">OS</div><div class="zm-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
    c.appendChild(d); c.scrollTop = c.scrollHeight;
  }

  async function sendMsg() {
    var inp = document.getElementById('zg-inp');
    var text = inp.value.trim();
    if (!text || isLoading) return;
    isLoading = true;
    document.getElementById('zg-send').disabled = true;
    inp.value = '';
    addMsg('user', text);
    addTyping();
    try {
      var res = await fetch('https://showcase-bot.onrender.com/ochsen-sinzheim/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: chatHistory })
      });
      var data = await res.json();
      var t = document.getElementById('typing');
      if (t) t.remove();
      var reply = data.reply || 'Bitte kontaktieren Sie uns direkt: +49 7221 92275-10';
      chatHistory.push({ role: 'user', content: text });
      chatHistory.push({ role: 'assistant', content: reply });
      addMsg('bot', reply);
    } catch(e) {
      var t = document.getElementById('typing');
      if (t) t.remove();
      addMsg('bot', '⚠️ Server nicht erreichbar. Bitte server.py starten!');
    }
    isLoading = false;
    document.getElementById('zg-send').disabled = false;
    inp.focus();
  }

  document.getElementById('zg-send').addEventListener('click', sendMsg);
  document.getElementById('zg-inp').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendMsg();
  });
</script>
</body>
</html>
